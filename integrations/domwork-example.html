<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Domwork — lid integratsiyasi namunasi</title>
</head>
<body>
    <h2>Domwork ro'yxatdan o'tish (namuna)</h2>
    <form id="signupForm">
        <input id="name" placeholder="Ism" required>
        <input id="phone" placeholder="Telefon" required>
        <button type="submit">Yuborish</button>
    </form>

    <script src="mh-lead-webhook.js"></script>
    <script>
        // Production: apiUrl va secret ni o'zgartiring
        MyhomeworkLeads.configure({
            apiUrl: 'https://SIZNING-DOMENINGIZ.uz/api/leads',
            secret: 'LEADS_WEBHOOK_SECRET',
            source: 'domwork'
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();

            // Avval o'z backend/DB ga saqlang (agar bor bo'lsa), keyin admin panelga yuboring
            try {
                await MyhomeworkLeads.sendLead({
                    name,
                    phone,
                    externalId: 'domwork_' + Date.now()
                });
                alert('Muvaffaqiyatli! Sotuv jamoasi tez orada bog\'lanadi.');
            } catch (err) {
                console.error('Lid yuborilmadi:', err.message);
            }
        });
    </script>
</body>
</html>
