<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Myhomework.uz - Tizimga kirish</title>
    <link rel="icon" href="images/myhomework-logo.png" type="image/png">
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="auth-body">
    <button class="auth-theme-btn icon-btn" id="themeToggle" type="button" title="Tungi rejim">
        <svg viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
    </button>
    <div class="auth-container">
        <div class="auth-brand">
            <img src="images/myhomework-logo.png" alt="Homework" class="auth-logo-img">
        </div>
        <p class="subtitle">Tizimga kirish</p>

        <div id="errorMessage" class="alert-danger" style="display: none;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="loginUsername">Login</label>
                <input type="text" id="loginUsername" required placeholder="Loginingizni kiriting"
                    autocomplete="username">
            </div>
            <div class="form-group">
                <label for="loginPassword">Parol</label>
                <div class="input-password-wrap">
                    <input type="password" id="loginPassword" required placeholder="Parolingizni kiriting"
                        autocomplete="current-password">
                    <button type="button" class="input-eye-btn" id="toggleLoginPassword" aria-label="Parolni ko'rsat/yashir" tabindex="-1">
                        <svg id="eyeIconOpen" viewBox="0 0 24 24" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg id="eyeIconClosed" viewBox="0 0 24 24" aria-hidden="true" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-auth" id="loginBtn">Kirish</button>
        </form>

        <p class="auth-footer" style="margin-top: 16px;">
            Kirish ma'lumotlaringiz yo'qmi? <strong>Admin bilan bog'laning</strong>
        </p>
    </div>
    <script src="js/auth.js"></script>
</body>

</html>
